apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: csi-demo-app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: ryan-demo-redirect-https@kubernetescrd
spec:
  ingressClassName: kommander-traefik
  tls:
    - hosts:
        - ryan-demo.sslip.nutanixdemo.com
      secretName: kommander-ingress
  rules:
    - host: ryan-demo.sslip.nutanixdemo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: csi-demo-app
                port:
                  number: 80
