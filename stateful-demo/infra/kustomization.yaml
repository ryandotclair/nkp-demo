# Stateful: app + PVCs (block + file). Use with init.sh <IP> <NAMESPACE> stateful — this is the commit audience sees.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ryan-demo
resources:
  - namespace.yaml
  - middleware-redirect-https.yaml
  - pvc-block.yaml
  - pvc-file.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
